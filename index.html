<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRM Masterpiece Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #6366f1; --new: #3b82f6; --contacted: #eab308; --converted: #22c55e;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 40px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-left: 5px solid var(--accent); padding-left: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: var(--accent); color: white; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid #334155; }
        th { background: #334155; padding: 18px; text-align: left; font-weight: 600; }
        td { padding: 18px; border-bottom: 1px solid #334155; }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .bg-New { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid #3b82f6; }
        .bg-Contacted { background: rgba(234, 179, 8, 0.2); color: #fbbf24; border: 1px solid #eab308; }
        .bg-Converted { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #22c55e; }
        
        .del-btn { background: #991b1b; padding: 6px 12px; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>CRM Masterpiece</h1>
            <p>Professional Lead Management Dashboard</p>
        </div>
        <button onclick="myCRM.auth.signOut()" style="background:#475569;">Logout</button>
    </div>

    <div class="card">
        <h3>Add New Lead</h3>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email Address">
        <input type="text" id="source" placeholder="Source">
        <select id="status">
            <option value="New">New</option>
            <option value="Contacted">Contacted</option>
            <option value="Converted">Converted</option>
        </select>
        <textarea id="notes" placeholder="Add follow-up notes..."></textarea>
        <button id="addBtn">Add Lead</button>
    </div>

    <table>
        <thead><tr><th>Name</th><th>Email</th><th>Source</th><th>Status</th><th>Notes</th><th>Actions</th></tr></thead>
        <tbody id="leadTableBody"></tbody>
    </table>

<script>
    const myCRM = window.supabase.createClient(
        'https://ifujxrvbgltilyrdezlh.supabase.co', 
        'sb_publishable_uN4x9Rl2K7jOprK4QWHkjQ_hYZSr4kK'
    );

    async function checkAuth() {
        const { data: { session } } = await myCRM.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return;
        }
        loadLeads();
    }

    checkAuth();

    myCRM.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_OUT') window.location.href = 'login.html';
    });

    async function loadLeads() {
        const { data, error } = await myCRM.from('leads').select('*');
        if (error) return;
        
        document.getElementById('leadTableBody').innerHTML = data.map(l => `<tr>
            <td><strong>${l.name}</strong></td>
            <td>${l.email}</td>
            <td>${l.source}</td>
            <td><span class="badge bg-${l.status}">${l.status}</span></td>
            <td>${l.notes}</td>
            <td><button class="del-btn" data-id="${l.id}">Delete</button></td>
        </tr>`).join('');
    }

    async function addLead() {
        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        const { error } = await myCRM.from('leads').insert([{
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            source: document.getElementById('source').value,
            status: document.getElementById('status').value,
            notes: document.getElementById('notes').value
        }]);
        
        if (!error) {
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
            loadLeads();
        }
        btn.innerText = "Add Lead";
        btn.disabled = false;
    }

    document.addEventListener('click', e => {
        if (e.target.classList.contains('del-btn')) {
            myCRM.from('leads').delete().eq('id', e.target.getAttribute('data-id')).then(() => loadLeads());
        }
    });

    document.getElementById('addBtn').addEventListener('click', addLead);
</script>
</body>
</html>
